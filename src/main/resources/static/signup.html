<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sign Up — YT SEO Studio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--bg2:#111;--line:rgba(255,255,255,0.07);--line2:rgba(255,255,255,0.12);
  --fg:#f5f5f5;--fg2:#a0a0a0;--fg3:#555;--accent:#ff0000;--accent2:#cc0000;--green:#2ba640;
}
html,body{
  min-height:100vh; font-family:'DM Sans',sans-serif;
  background:var(--bg);color:var(--fg);overflow-x:hidden;
}

/* ── BACKGROUND ── */
.canvas{position:fixed;inset:0;overflow:hidden;pointer-events:none}
.orb{position:absolute;border-radius:50%;filter:blur(130px);opacity:.1}
.orb1{width:400px;height:400px;background:#ff2200;top:-80px;left:-80px;animation:o1 18s ease-in-out infinite}
.orb2{width:500px;height:500px;background:#ff0000;bottom:-120px;right:-100px;animation:o2 14s ease-in-out infinite}
.orb3{width:250px;height:250px;background:#ff4400;top:40%;right:20%;animation:o3 10s ease-in-out infinite}
@keyframes o1{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,20px) scale(1.1)}}
@keyframes o2{0%,100%{transform:translate(0,0)}50%{transform:translate(-25px,-15px) scale(1.08)}}
@keyframes o3{0%,100%{transform:scale(1)}50%{transform:scale(1.25)}}
.grid{
  position:fixed;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);
  background-size:60px 60px;
}

/* ── LAYOUT ── */
.wrap{
  position:relative;z-index:1;
  min-height:100vh;min-height:-webkit-fill-available;
  display:flex;align-items:flex-start;justify-content:center;
  padding:32px 20px;
  padding-top:max(32px, env(safe-area-inset-top));
  padding-bottom:max(32px, env(safe-area-inset-bottom));
}

/* ── CARD ── */
.card{
  width:100%;max-width:440px;
  background:rgba(17,17,17,0.88);
  border:1px solid var(--line2);border-radius:24px;
  padding:44px 40px 38px;
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  box-shadow:0 40px 100px rgba(0,0,0,0.6),inset 0 0 0 1px rgba(255,255,255,0.04);
  animation:cardIn .7s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(28px) scale(.96)}to{opacity:1;transform:none}}

/* ── LOGO ── */
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:30px;animation:fadeUp .5s .1s both}
.logo-ic{width:38px;height:38px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center}
.logo-ic svg{width:20px;height:20px;fill:white}
.logo-name{font-family:'DM Serif Display',serif;font-size:17px;color:var(--fg)}
.logo-name span{color:var(--accent)}

/* ── HEADINGS ── */
h1{font-family:'DM Serif Display',serif;font-size:1.9rem;font-weight:400;line-height:1.15;margin-bottom:6px;animation:fadeUp .5s .15s both}
h1 em{font-style:italic;color:var(--accent)}
.sub{font-size:13px;color:var(--fg2);margin-bottom:20px;line-height:1.6;animation:fadeUp .5s .2s both}

/* ── PERKS ── */
.perks{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:22px;animation:fadeUp .5s .18s both}
.perk{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--fg3);font-family:'JetBrains Mono',monospace}
.perk-dot{width:5px;height:5px;border-radius:50%;background:var(--accent)}

/* ── FIELDS ── */
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{margin-bottom:16px;animation:fadeUp .5s both}
.field:nth-child(1){animation-delay:.22s}.field:nth-child(2){animation-delay:.27s}
.field:nth-child(3){animation-delay:.32s}.field:nth-child(4){animation-delay:.37s}
.f-label{display:block;font-size:11px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--fg3);margin-bottom:7px}
.f-input{
  width:100%;padding:12px 15px;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--line2);border-radius:10px;
  font-family:'DM Sans',sans-serif;font-size:16px;color:var(--fg);
  outline:none;transition:border-color .2s,background .2s,box-shadow .2s;
  -webkit-appearance:none;appearance:none;
}
.f-input::placeholder{color:var(--fg3)}
.f-input:focus{border-color:var(--accent);background:rgba(255,0,0,0.04);box-shadow:0 0 0 3px rgba(255,0,0,0.1)}
.f-input.err{border-color:var(--accent);animation:shake .4s ease}

/* ── STRENGTH ── */
.strength-wrap{margin-top:8px;display:none}
.strength-wrap.show{display:block}
.strength-bar{height:3px;border-radius:2px;background:var(--line2);overflow:hidden;margin-bottom:4px}
.strength-fill{height:100%;border-radius:2px;transition:width .3s ease,background .3s ease;width:0}
.strength-lbl{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--fg3)}

/* ── TERMS ── */
.terms-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:20px;animation:fadeUp .5s .4s both}
.terms-row input[type=checkbox]{
  margin-top:3px;accent-color:var(--accent);flex-shrink:0;
  width:16px;height:16px;cursor:pointer;
}
.terms-row label{font-size:12.5px;color:var(--fg2);line-height:1.5;cursor:pointer}
.terms-row a{color:var(--accent);text-decoration:none}
.terms-row a:hover{text-decoration:underline}

/* ── BUTTON ── */
.btn{
  width:100%;padding:14px;
  background:var(--accent);color:#fff;border:none;border-radius:10px;
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
  transition:background .18s,transform .15s,box-shadow .2s;
  position:relative;overflow:hidden;animation:fadeUp .5s .45s both;
  -webkit-tap-highlight-color:transparent;min-height:48px;
}
.btn::before{content:'';position:absolute;inset:0;background:rgba(255,255,255,.14);transform:translateX(-110%) skewX(-18deg);transition:transform .45s ease}
.btn:hover::before{transform:translateX(160%) skewX(-18deg)}
.btn:hover{background:var(--accent2);box-shadow:0 8px 30px rgba(255,0,0,0.4);transform:translateY(-2px)}
.btn:active{transform:scale(.97)}
.btn.loading{opacity:.7;pointer-events:none}
.spin{display:none;width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite}
.btn.loading .spin{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── DIVIDER ── */
.divider{display:flex;align-items:center;gap:14px;margin:20px 0;animation:fadeUp .5s .5s both}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--line)}
.divider span{font-size:12px;color:var(--fg3);white-space:nowrap;font-family:'JetBrains Mono',monospace}

.login-link{text-align:center;font-size:13.5px;color:var(--fg2);animation:fadeUp .5s .55s both}
.login-link a{color:var(--accent);text-decoration:none;font-weight:600;transition:color .2s}
.login-link a:hover{color:#ff4444}

/* ── MSG ── */
.msg{margin-top:14px;padding:11px 16px;border-radius:10px;font-size:13px;display:none;animation:fadeUp .3s both;line-height:1.5}
.msg.ok{background:rgba(43,166,64,.12);border:1px solid rgba(43,166,64,.25);color:#3cc455}
.msg.fail{background:rgba(255,0,0,.09);border:1px solid rgba(255,0,0,.22);color:#ff4444}
.msg.show{display:block}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

/* ── MOBILE ── */
@media (max-width: 480px) {
  .wrap { padding: 24px 16px; }
  .card { padding: 32px 24px 28px; border-radius: 20px; }
  .row2 { grid-template-columns: 1fr 1fr; gap: 10px; }
  h1 { font-size: 1.7rem; }
  .sub { margin-bottom: 16px; }
  .logo-row { margin-bottom: 24px; }
}

@media (max-width: 360px) {
  .row2 { grid-template-columns: 1fr; gap: 0; }
  .card { padding: 28px 18px 24px; border-radius: 16px; }
  h1 { font-size: 1.55rem; }
}
</style>
</head>
<body>
<div class="canvas">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>
<div class="grid"></div>

<div class="wrap">
  <div class="card">
    <div class="logo-row">
      <div class="logo-ic">
        <svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
      </div>
      <div class="logo-name">YT <span>SEO</span> Studio</div>
    </div>

    <h1>Create your<br><em>account.</em></h1>
    <p class="sub">Join to analyze, search and summarize YouTube videos.</p>

    <div class="perks">
      <span class="perk"><span class="perk-dot"></span>Free forever</span>
      <span class="perk"><span class="perk-dot"></span>SEO Analyzer</span>
      <span class="perk"><span class="perk-dot"></span>AI Summaries</span>
    </div>

    <div class="row2">
      <div class="field">
        <label class="f-label" for="fname">First name</label>
        <input class="f-input" type="text" id="fname" placeholder="Alex" autocomplete="given-name">
      </div>
      <div class="field">
        <label class="f-label" for="lname">Last name</label>
        <input class="f-input" type="text" id="lname" placeholder="Smith" autocomplete="family-name">
      </div>
    </div>

    <div class="field">
      <label class="f-label" for="email">Email address</label>
      <input class="f-input" type="email" id="email" placeholder="you@example.com" autocomplete="email" inputmode="email">
    </div>
    <div class="field">
      <label class="f-label" for="password">Password</label>
      <input class="f-input" type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password" oninput="checkStrength()">
      <div class="strength-wrap" id="strengthWrap">
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="strength-lbl" id="strengthLbl"></div>
      </div>
    </div>

    <div class="terms-row">
      <input type="checkbox" id="terms">
      <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
    </div>

    <button class="btn" id="regBtn" onclick="doRegister()">
      <div class="spin"></div>
      Create Account
    </button>

    <div class="msg" id="msg"></div>

    <div class="divider"><span>already have an account?</span></div>
    <div class="login-link">Sign in to your account → <a href="login.html">Log in</a></div>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxwHD8Teyy-Zms8kD0s5rRPfbVKWXxgnHX9TpF8H3rfJne_nACeKGAfEuPJIN9otIKK/exec';

if (localStorage.getItem('userId')) window.location.href = 'index.html';

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text; el.className = 'msg ' + type + ' show';
}
function shake(id) {
  const el = document.getElementById(id);
  el.classList.add('err'); setTimeout(() => el.classList.remove('err'), 500);
}
function checkStrength() {
  const pw = document.getElementById('password').value;
  const wrap = document.getElementById('strengthWrap');
  const fill = document.getElementById('strengthFill');
  const lbl  = document.getElementById('strengthLbl');
  if (!pw) { wrap.classList.remove('show'); return; }
  wrap.classList.add('show');
  let score = 0;
  if (pw.length >= 8)           score++;
  if (/[A-Z]/.test(pw))         score++;
  if (/[0-9]/.test(pw))         score++;
  if (/[^A-Za-z0-9]/.test(pw))  score++;
  const levels = [
    {pct:'20%',color:'#ff3333',text:'Weak'},
    {pct:'45%',color:'#ff8800',text:'Fair'},
    {pct:'70%',color:'#ffcc00',text:'Good'},
    {pct:'100%',color:'#2ba640',text:'Strong'},
  ];
  const l = levels[Math.max(0, score - 1)];
  fill.style.width = l.pct; fill.style.background = l.color;
  lbl.textContent = l.text; lbl.style.color = l.color;
}
async function doRegister() {
  const fname    = document.getElementById('fname').value.trim();
  const lname    = document.getElementById('lname').value.trim();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const terms    = document.getElementById('terms').checked;

  if (!fname)              { shake('fname');    showMsg('First name is required.', 'fail');                   return; }
  if (!email)              { shake('email');    showMsg('Email is required.', 'fail');                        return; }
  if (password.length < 8) { shake('password'); showMsg('Password must be at least 8 characters.', 'fail');  return; }
  if (!terms)              {                    showMsg('Please agree to the Terms of Service.', 'fail');     return; }

  const btn = document.getElementById('regBtn');
  btn.classList.add('loading');
  try {
    const params = new URLSearchParams({ action:'register', firstName:fname, lastName:lname, email, password });
    const res  = await fetch(APPS_SCRIPT_URL + '?' + params.toString());
    const data = await res.json();
    if (data.status === 'success') {
      showMsg('✓ Account created! Redirecting to login…', 'ok');
      setTimeout(() => { window.location.href = 'login.html'; }, 1200);
    } else {
      showMsg(data.message || 'Registration failed. Try again.', 'fail');
    }
  } catch (e) {
    showMsg('Connection error. Check your Apps Script URL is deployed as "Anyone".', 'fail');
    console.error(e);
  } finally {
    btn.classList.remove('loading');
  }
}
</script>
</body>
</html>
