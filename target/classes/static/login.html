<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Login — YT SEO Studio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--bg2:#111111;--bg3:#1a1a1a;
  --line:rgba(255,255,255,0.07);--line2:rgba(255,255,255,0.12);
  --fg:#f5f5f5;--fg2:#a0a0a0;--fg3:#555;
  --accent:#ff0000;--accent2:#cc0000;--green:#2ba640;--radius:12px;
}
html,body{
  height:100%; min-height:100vh;
  font-family:'DM Sans',sans-serif;
  background:var(--bg);color:var(--fg);
  overflow-x:hidden;
}

/* ── BACKGROUND ── */
.canvas{position:fixed;inset:0;overflow:hidden;pointer-events:none}
.orb{position:absolute;border-radius:50%;filter:blur(120px);opacity:.12}
.orb1{width:500px;height:500px;background:#ff0000;top:-100px;right:-100px;animation:o1 16s ease-in-out infinite}
.orb2{width:350px;height:350px;background:#cc2200;bottom:-80px;left:-60px;animation:o2 12s ease-in-out infinite}
.orb3{width:200px;height:200px;background:#ff4400;top:50%;left:30%;animation:o3 9s ease-in-out infinite}
@keyframes o1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-40px,30px) scale(1.15)}}
@keyframes o2{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-20px) scale(1.1)}}
@keyframes o3{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.3)}}

.grid{
  position:fixed;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
  background-size:60px 60px;
}

/* ── LAYOUT ── */
.wrap{
  position:relative;z-index:1;
  min-height:100vh; min-height:-webkit-fill-available;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
  padding-top:max(20px, env(safe-area-inset-top));
  padding-bottom:max(20px, env(safe-area-inset-bottom));
}

/* ── CARD ── */
.card{
  width:100%;max-width:420px;
  background:rgba(17,17,17,0.88);
  border:1px solid var(--line2);
  border-radius:24px;
  padding:44px 40px 40px;
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  box-shadow:0 40px 100px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.04) inset;
  animation:cardIn .7s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(28px) scale(.96)}to{opacity:1;transform:none}}

/* ── LOGO ── */
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:36px;animation:fadeUp .5s .1s both}
.logo-ic{width:40px;height:40px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-ic svg{width:22px;height:22px;fill:white}
.logo-name{font-family:'DM Serif Display',serif;font-size:18px;color:var(--fg)}
.logo-name span{color:var(--accent)}

/* ── HEADINGS ── */
h1{font-family:'DM Serif Display',serif;font-size:2rem;font-weight:400;line-height:1.15;margin-bottom:6px;animation:fadeUp .5s .15s both}
h1 em{font-style:italic;color:var(--accent)}
.sub{font-size:13.5px;color:var(--fg2);margin-bottom:32px;line-height:1.6;animation:fadeUp .5s .2s both}

/* ── FIELDS ── */
.field{margin-bottom:18px;animation:fadeUp .5s both}
.field:nth-child(1){animation-delay:.25s}.field:nth-child(2){animation-delay:.3s}
.f-label{display:block;font-size:11px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--fg3);margin-bottom:8px}
.f-input{
  width:100%;padding:13px 16px;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--line2);border-radius:10px;
  font-family:'DM Sans',sans-serif;font-size:16px;color:var(--fg);
  outline:none;transition:border-color .2s,background .2s,box-shadow .2s;
  -webkit-appearance:none; appearance:none;
}
.f-input::placeholder{color:var(--fg3)}
.f-input:focus{border-color:var(--accent);background:rgba(255,0,0,0.04);box-shadow:0 0 0 3px rgba(255,0,0,0.1)}
.f-input.err{border-color:var(--accent);animation:shake .4s ease}

/* ── FORGOT ── */
.forgot{
  display:block;text-align:right;font-size:12px;color:var(--fg3);
  text-decoration:none;margin-top:-10px;margin-bottom:24px;transition:color .2s;
  -webkit-tap-highlight-color:transparent;
}
.forgot:hover{color:var(--accent)}

/* ── BUTTON ── */
.btn{
  width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:10px;
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
  transition:background .18s,transform .15s,box-shadow .2s;position:relative;overflow:hidden;
  animation:fadeUp .5s .35s both;
  -webkit-tap-highlight-color:transparent;
  min-height:48px;
}
.btn::before{content:'';position:absolute;inset:0;background:rgba(255,255,255,.14);transform:translateX(-110%) skewX(-18deg);transition:transform .45s ease}
.btn:hover::before{transform:translateX(160%) skewX(-18deg)}
.btn:hover{background:var(--accent2);box-shadow:0 8px 30px rgba(255,0,0,0.4);transform:translateY(-2px)}
.btn:active{transform:scale(.97)}
.btn.loading{opacity:.7;pointer-events:none}
.spin{display:none;width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite}
.btn.loading .spin{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── DIVIDER ── */
.divider{display:flex;align-items:center;gap:14px;margin:22px 0;animation:fadeUp .5s .4s both}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--line)}
.divider span{font-size:12px;color:var(--fg3);white-space:nowrap;font-family:'JetBrains Mono',monospace}

/* ── SIGNUP LINK ── */
.signup-link{text-align:center;font-size:13.5px;color:var(--fg2);animation:fadeUp .5s .45s both}
.signup-link a{color:var(--accent);text-decoration:none;font-weight:600;transition:color .2s}
.signup-link a:hover{color:#ff4444}

/* ── MSG ── */
.msg{margin-top:14px;padding:11px 16px;border-radius:10px;font-size:13px;display:none;animation:fadeUp .3s ease both;line-height:1.5}
.msg.ok{background:rgba(43,166,64,.12);border:1px solid rgba(43,166,64,.25);color:#3cc455}
.msg.fail{background:rgba(255,0,0,.09);border:1px solid rgba(255,0,0,.22);color:#ff4444}
.msg.show{display:block}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

/* ── MOBILE ADJUSTMENTS ── */
@media (max-width: 480px) {
  .card {
    padding: 32px 24px 28px;
    border-radius: 20px;
    /* Slightly more transparent on mobile for bg visibility */
    background: rgba(17,17,17,0.92);
  }
  h1 { font-size: 1.75rem; }
  .logo-row { margin-bottom: 28px; }
  .sub { margin-bottom: 24px; font-size: 13px; }
}

@media (max-width: 360px) {
  .card { padding: 28px 20px 24px; border-radius: 16px; }
  h1 { font-size: 1.6rem; }
}
</style>
</head>
<body>
<div class="canvas">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>
<div class="grid"></div>

<div class="wrap">
  <div class="card">
    <div class="logo-row">
      <div class="logo-ic">
        <svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
      </div>
      <div class="logo-name">YT <span>SEO</span> Studio</div>
    </div>

    <h1>Welcome<br><em>back.</em></h1>
    <p class="sub">Sign in to continue to your workspace.</p>

    <div class="field">
      <label class="f-label" for="email">Email address</label>
      <input class="f-input" type="email" id="email" placeholder="you@example.com" autocomplete="email" inputmode="email">
    </div>
    <div class="field">
      <label class="f-label" for="password">Password</label>
      <input class="f-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <a href="#" class="forgot">Forgot password?</a>

    <button class="btn" id="loginBtn" onclick="doLogin()">
      <div class="spin"></div>
      Sign In
    </button>

    <div class="msg" id="msg"></div>

    <div class="divider"><span>new here?</span></div>
    <div class="signup-link">Don't have an account? <a href="signup.html">Create one →</a></div>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxwHD8Teyy-Zms8kD0s5rRPfbVKWXxgnHX9TpF8H3rfJne_nACeKGAfEuPJIN9otIKK/exec';

if (localStorage.getItem('userId')) window.location.href = 'index.html';

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text; el.className = 'msg ' + type + ' show';
}

function shake(id) {
  const el = document.getElementById(id);
  el.classList.add('err'); setTimeout(() => el.classList.remove('err'), 500);
}

async function doLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email)    { shake('email');    showMsg('Please enter your email.', 'fail');    return; }
  if (!password) { shake('password'); showMsg('Please enter your password.', 'fail'); return; }

  const btn = document.getElementById('loginBtn');
  btn.classList.add('loading');
  try {
    const params = new URLSearchParams({ action: 'login', email, password });
    const res    = await fetch(APPS_SCRIPT_URL + '?' + params.toString());
    const data   = await res.json();
    if (data.status === 'success') {
      localStorage.setItem('userId',    data.userId);
      localStorage.setItem('userEmail', email);
      showMsg('✓ Login successful! Redirecting…', 'ok');
      setTimeout(() => { window.location.href = 'index.html'; }, 900);
    } else {
      showMsg(data.message || 'Invalid email or password.', 'fail');
      shake('password');
    }
  } catch (e) {
    showMsg('Connection error. Check your Apps Script URL is deployed as "Anyone".', 'fail');
    console.error(e);
  } finally {
    btn.classList.remove('loading');
  }
}
</script>
</body>
</html>
